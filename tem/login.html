<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login - ShopKart</title>

    <link rel="stylesheet"
        href="style1.css">

</head>

<body>
    <!-- Header Load -->
    <div id="header"></div>


    <!-- ========================= -->
    <!-- Login Page -->
    <!-- ========================= -->

    <section class="login-page">

        <!-- Logo -->
        <div class="login-logo">

            <a href="index.html">

                ShopKart

            </a>

        </div>

        <!-- Login Container -->
        <div class="login-container">

            <h1>
                Sign In
            </h1>

            <!-- Login Form -->
            <form class="login-form">

                <!-- Email -->
                <div class="form-group">

                    <label>
                        Email or Mobile Number
                    </label>

                    <input type="text"
                        placeholder="Enter email or mobile number">

                </div>

                <!-- Password -->
                <div class="form-group">

                    <div class="password-top">

                        <label>
                            Password
                        </label>

                        <a href="#"
                            class="forgot-link">

                            Forgot Password?

                        </a>

                    </div>

                    <input type="password"
                        placeholder="Enter password">

                </div>

                <!-- Login Button -->
                <button type="submit"
                    class="login-btn">

                    Sign In

                </button>

                <!-- Terms -->
                <p class="terms-text">

                    By continuing, you agree to
                    ShopKart's Conditions of Use
                    and Privacy Notice.

                </p>

                <!-- Keep Login -->
                <div class="keep-login">

                    <input type="checkbox"
                        id="remember">

                    <label for="remember">

                        Keep me signed in

                    </label>

                </div>

            </form>

            <!-- Divider -->
            <div class="divider">

                <span>
                    New to ShopKart?
                </span>

            </div>

            <!-- Create Account -->
            <a href="register.html"
                class="create-account-btn">

                Create Your ShopKart Account

            </a>

        </div>

    </section>

    <div id="footer"></div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Load Header Footer -->
    <script>

        $(function () {

            $("#header").load("header.html");

            $("#footer").load("footer.html");

        });

    </script>

</body>

</html>
