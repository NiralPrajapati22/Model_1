<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopZone Sign-In</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">

    <!-- Compact Auth Brand Header -->
    <div class="auth-header-logo">
        <a href="index.html">ShopZone</a>
    </div>

    <!-- Login Card Container -->
    <main class="auth-card">
        <h1>Sign in</h1>

        <form>
            <div class="auth-form-group">
                <label for="login-email">Email or mobile phone number</label>
                <input type="email" id="login-email" autocomplete="username">
            </div>

            <div class="auth-form-group">
                <div class="label-row">
                    <label for="login-password">Password</label>
                    <a href="#" class="auth-link font-small">Forgot your password?</a>
                </div>
                <input type="password" id="login-password" autocomplete="current-password">
            </div>

            <!-- Wrapped the button in a standard hyperlink anchor -->
            <a href="index.html" style="text-decoration: none; display: block; width: 100%;">
                <button type="button" class="auth-primary-btn">Sign in</button>
            </a>
        </form>

        <p class="auth-legal-text">
            By continuing, you agree to ShopZone's <a href="#" class="auth-link">Conditions of Use</a> and <a href="#"
                class="auth-link">Privacy Notice</a>.
        </p>

        <div class="auth-disclosure-item">
            <label class="auth-checkbox-label">
                <input type="checkbox" checked> Keep me signed in.
            </label>
        </div>
    </main>

    <!-- Breakout Splitter for Account Creation Redirect -->
    <div class="auth-splitter">
        <h5>New to ShopZone?</h5>
    </div>

    <div class="auth-redirect-wrapper">
        <a href="register.html" class="auth-secondary-btn">Create your ShopZone account</a>
    </div>

    <!-- Minimalist Clean Footer -->
    <footer class="auth-footer">
        <div class="footer-links">
            <a href="#" class="auth-link">Conditions of Use</a>
            <a href="#" class="auth-link">Privacy Notice</a>
            <a href="#" class="auth-link">Help</a>
        </div>
        <p>&copy; 2026, ShopZone.com, Inc. or its affiliates</p>
    </footer>

</body>

</html>
