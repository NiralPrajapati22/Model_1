<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopZone Registration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">

    <!-- Compact Auth Brand Header -->
    <div class="auth-header-logo">
        <a href="index.html">ShopZone</a>
    </div>

    <!-- Registration Card Container -->
    <main class="auth-card">
        <h1>Create account</h1>

        <form action="login.html">
            <div class="auth-form-group">
                <label for="reg-name">Your name</label>
                <input type="text" id="reg-name" placeholder="First and last name" autocomplete="name" required>
            </div>

            <div class="auth-form-group">
                <label for="reg-email">Mobile number or email</label>
                <input type="email" id="reg-email" autocomplete="email" required>
            </div>

            <div class="auth-form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" placeholder="At least 6 characters" autocomplete="new-password"
                    minlength="6" required>
                <div class="input-info-msg">ℹ Passwords must be at least 6 characters.</div>
            </div>

            <div class="auth-form-group">
                <label for="reg-password-confirm">Re-enter password</label>
                <input type="password" id="reg-password-confirm" autocomplete="new-password" required>
            </div>

            <button type="submit" class="auth-primary-btn">Create your account</button>
        </form>

        <p class="auth-legal-text">
            By creating an account, you agree to ShopZone's <a href="#" class="auth-link">Conditions of Use</a> and <a
                href="#" class="auth-link">Privacy Notice</a>.
        </p>

        <hr class="auth-card-divider">

        <p class="auth-redirect-inline">
            Already have an account? <a href="login.html" class="auth-link">Sign in ➔</a>
        </p>
    </main>

    <!-- Minimalist Clean Footer -->
    <footer class="auth-footer">
        <div class="footer-links">
            <a href="#" class="auth-link">Conditions of Use</a>
            <a href="#" class="auth-link">Privacy Notice</a>
            <a href="#" class="auth-link">Help</a>
        </div>
        <p>&copy; 2026, ShopZone.com, Inc. or its affiliates</p>
    </footer>

</body>

</html>
