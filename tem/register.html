<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Create Account - ShopKart</title>

    <link rel="stylesheet"
        href="style1.css">

</head>

<body>

    <!-- Header Load -->
    <div id="header"></div>

    <!-- ========================= -->
    <!-- Register Page -->
    <!-- ========================= -->

    <section class="register-page">

        <!-- Logo -->
        <div class="register-logo">

            <a href="index.html">

                ShopKart

            </a>

        </div>

        <!-- Register Box -->
        <div class="register-container">

            <h1>
                Create Account
            </h1>

            <form class="register-form">

                <!-- Full Name -->
                <div class="form-group">

                    <label>
                        Your Name
                    </label>

                    <input type="text"
                        placeholder="First and last name">

                </div>

                <!-- Mobile -->
                <div class="form-group">

                    <label>
                        Mobile Number
                    </label>

                    <input type="text"
                        placeholder="Enter mobile number">

                </div>

                <!-- Email -->
                <div class="form-group">

                    <label>
                        Email Address
                    </label>

                    <input type="email"
                        placeholder="Enter email address">

                </div>

                <!-- Password -->
                <div class="form-group">

                    <label>
                        Password
                    </label>

                    <input type="password"
                        placeholder="At least 6 characters">

                    <small>

                        Passwords must be at least 6 characters.

                    </small>

                </div>

                <!-- Re Password -->
                <div class="form-group">

                    <label>
                        Re-enter Password
                    </label>

                    <input type="password"
                        placeholder="Confirm password">

                </div>

                <!-- Register Button -->
                <button type="submit"
                    class="register-btn">

                    Create Your ShopKart Account

                </button>

                <!-- Terms -->
                <p class="terms-text">

                    By creating an account, you agree to
                    ShopKart's Conditions of Use and Privacy Notice.

                </p>

            </form>

            <!-- Divider -->
            <div class="divider"></div>

            <!-- Already Account -->
            <div class="already-account">

                <p>

                    Already have an account?

                    <a href="login.html">

                        Sign In

                    </a>

                </p>

            </div>

        </div>

    </section>

        <!-- Footer Load -->
    <div id="footer"></div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Load Header Footer -->
    <script>

        $(function () {

            $("#header").load("header.html");

            $("#footer").load("footer.html");

        });

    </script>


</body>

</html>
