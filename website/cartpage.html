<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add To Cart Page</title>
  <style>
/* CART SECTION */

.cart-section{
    width:90%;
    margin:40px auto;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:30px;
}

/* LEFT SIDE */

.cart-items{
    background:#fff;
    padding:25px;
    border-radius:15px;
}

.cart-items h2{
    font-size:32px;
    margin-bottom:25px;
}

.cart-card{
    display:flex;
    gap:20px;
    border-bottom:1px solid #eee;
    padding:20px 0;
}

.cart-card img{
    width:130px;
    height:130px;
    object-fit:cover;
    border-radius:12px;
}

.cart-details{
    flex:1;
}

.cart-details h3{
    font-size:24px;
    margin-bottom:10px;
}

.cart-details p{
    color:#666;
    margin-bottom:10px;
}

.price{
    font-size:26px;
    font-weight:700;
    margin-bottom:15px;
}

/* QUANTITY */

.quantity{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:15px;
}

.quantity button{
    width:32px;
    height:32px;
    border:none;
    background:#111820;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
    font-size:18px;
}

.quantity span{
    font-size:18px;
    font-weight:bold;
}

/* REMOVE */

.cart-details a{
    color:red;
    text-decoration:none;
    font-size:15px;
}

/* RIGHT SIDE */

.cart-summary{
    background:#fff;
    padding:25px;
    border-radius:15px;
    height:fit-content;
}

.cart-summary h2{
    font-size:30px;
    margin-bottom:25px;
}

.summary-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:18px;
    font-size:17px;
}

.total{
    border-top:1px solid #ddd;
    padding-top:18px;
    font-size:22px;
    font-weight:700;
}

/* BUTTON */

.checkout-btn{
    width:100%;
    padding:16px;
    border:none;
    background:#111820;
    color:#fff;
    font-size:18px;
    font-weight:600;
    border-radius:12px;
    cursor:pointer;
    margin-top:20px;
    transition:0.3s;
}

.checkout-btn:hover{
    background:#000;
}
  </style>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

</head>
<body>
  <div id="nav">
    </div>

  <!-- CART SECTION -->

  <section class="cart-section">

    <!-- LEFT SIDE -->

    <div class="cart-items">

      <h2>Your Cart</h2>

      <!-- ITEM 1 -->

      <div class="cart-card">

        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1200&auto=format&fit=crop">

        <div class="cart-details">

          <h3>boAt Nirvana Zenith Pro</h3>

          <p>Wireless Earbuds</p>

          <div class="price">₹3,199</div>

          <div class="quantity">

            <button>-</button>

            <span>1</span>

            <button>+</button>

          </div>

          <a href="#">Remove</a>

        </div>

      </div>

      <!-- ITEM 2 -->

      <div class="cart-card">

        <img src="https://images.unsplash.com/photo-1606220588913-b3aacb4d2f37?q=80&w=1200&auto=format&fit=crop">

        <div class="cart-details">

          <h3>boAt Airdopes Supreme</h3>

          <p>Bluetooth Earbuds</p>

          <div class="price">₹1,499</div>

          <div class="quantity">

            <button>-</button>

            <span>1</span>

            <button>+</button>

          </div>

          <a href="#">Remove</a>

        </div>

      </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="cart-summary">

      <h2>Order Summary</h2>

      <div class="summary-row">
        <p>Subtotal</p>
        <span>₹4,698</span>
      </div>

      <div class="summary-row">
        <p>Shipping</p>
        <span>FREE</span>
      </div>

      <div class="summary-row">
        <p>Discount</p>
        <span>-₹300</span>
      </div>

      <div class="summary-row total">
        <p>Total</p>
        <span>₹4,398</span>
      </div>

      <button class="checkout-btn">
        Proceed To Checkout
      </button>

    </div>

  </section>

<div id="footer">

</div>
<script>
  $(document).ready(function(){
    $("#nav").load('nav.html')
    $("#footer").load('footer.html')
  })
    </script>

</body>
</html>
