<!DOCTYPE html>
<html>
<head>
    <title>PyScript Demo</title>

    <link rel="stylesheet"
          href="https://pyscript.net/releases/2024.1.1/core.css">

    <script type="module"
            src="https://pyscript.net/releases/2024.1.1/core.js"></script>
</head>

<body>

<h1>PyScript Example</h1>

<h2 id="output"></h2>
<py-script>
from pyscript import display

display("Hello from Python!", target="output")

for i in range(5):
    display(i, target="output")
</py-script>

</body>
</html>
